<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国医疗认证系统 | China Medical Auth</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f4f4; margin: 0; }
        /* মেনুবার */
        .navbar { background: #cc0000; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: bold; font-size: 18px; }
        
        .container { padding: 20px; max-width: 450px; margin: auto; background: white; border-radius: 0 0 10px 10px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #cc0000; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* अबाउट সেকশন */
        .about { font-size: 12px; color: #666; margin-top: 20px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 10px; }
        .contact { background: #fff8f8; padding: 10px; margin-top: 15px; border-left: 4px solid #cc0000; font-size: 13px; }
        
        .report-box { margin-top: 20px; border: 1px solid #999; padding: 10px; position: relative; }
        .stamp { position: absolute; top: 15px; right: 15px; border: 3px solid #000080; color: #000080; padding: 5px; font-weight: bold; transform: rotate(-15deg); opacity: 0.5; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #999; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo-text">中国医疗检查中心</div>
    <div>≡</div>
</div>

<div class="container">
    <h3 style="color:#cc0000; text-align:center;">官方查询系统 (Official Portal)</h3>
    <input type="text" id="passport" placeholder="输入护照号码 (Passport No)">
    <input type="text" id="mobile" placeholder="输入手机号码 (Mobile No)">
    <button onclick="checkReport()">立即查询 (Verify)</button>
    
    <div id="result"></div>

    <div class="contact">
        <strong>📞 服务热线 (Service Hotline):</strong> +86 10-6512-4422<br>
        <strong>📧 支持邮箱 (Support):</strong> info@health-china.org.cn
    </div>

    <div class="about">
        <strong>关于我们 (About Us):</strong><br>
        中国医疗检查中心负责对外劳务及留学生的医疗健康档案认证。本系统提供实时数据查询，确保健康报告的真实性与合规性。
    </div>
</div>

<script>
function checkReport() {
    let res = document.getElementById("result");
    let p = document.getElementById("passport").value;
    let m = document.getElementById("mobile").value;
    
    if(p === "A11758023" && m === "01407873051") {
        res.innerHTML = `
            <div class="report-box">
                <div class="stamp">VERIFIED</div>
                <img src="https://i.imgur.com/nQeMY9y.jpeg" style="width:100%;">
                <table>
                    <tr><th>项目 (Test)</th><th>结果 (Result)</th></tr>
                    <tr><td>心电图 (ECG)</td><td>正常 (Normal)</td></tr>
                    <tr><td>梅毒 (Syphilis)</td><td>阴性 (Negative)</td></tr>
                    <tr><td>艾滋病 (HIV)</td><td>阴性 (Negative)</td></tr>
                    <tr><td>胸片 (X-ray)</td><td>清晰 (Clear)</td></tr>
                </table>
            </div>
        `;
    } else {
        res.innerHTML = '<p style="color:red; text-align:center;">未找到记录 (No Record Found)</p>';
    }
}
</script>
</body>
</html>
