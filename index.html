<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>China Medical Verification | 中国医疗验证系统</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 360px; text-align: center; border-top: 10px solid #c8102e; }
        h2 { color: #c8102e; font-size: 22px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #c8102e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin: 20px 0; color: #c8102e; font-weight: bold; }
        .report-box { position: relative; margin-top: 20px; border: 2px solid #333; padding: 5px; }
        .stamp { position: absolute; top: 10px; right: 10px; border: 3px solid #000080; color: #000080; padding: 8px; font-weight: bold; transform: rotate(-15deg); opacity: 0.7; }
        .footer { font-size: 11px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Medical Verification</h2>
        <input type="text" id="passport" placeholder="Passport Number">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <button onclick="checkReport()">Verify / 验证</button>
        <div id="loader">Processing Request...</div>
        <div id="result"></div>
        <div class="footer">
            System Access Count: 48,291 | Official Authentication Platform
        </div>
    </div>

    <script>
    let attempts = 0;
    function checkReport() {
        if(attempts >= 3) {
            alert("Access Suspended for 30 minutes due to too many failed attempts.");
            return;
        }
        let loader = document.getElementById("loader");
        let resultDiv = document.getElementById("result");
        loader.style.display = "block";
        resultDiv.innerHTML = "";

        setTimeout(() => {
            loader.style.display = "none";
            let p = document.getElementById("passport").value;
            let m = document.getElementById("mobile").value;
            let users = [
                { pass: "A11758023", mob: "01407873051", img: "https://i.imgur.com/nQeMY9y.jpeg" },
                { pass: "A22231008", mob: "01794492265", img: "https://i.imgur.com/ibqu4TL.jpeg" }
            ];

            let found = users.find(u => u.pass === p && u.mob === m);
            if(found) {
                resultDiv.innerHTML = `
                    <div class="report-box">
                        <img src="${found.img}" style="width:100%;">
                        <div class="stamp">VERIFIED</div>
                    </div>
                    <p style="font-size:12px;">Ref: CN-${Math.floor(Math.random()*999999)}</p>
                    <button style="background:green;" onclick="alert('Downloading PDF...')">Download Official Report (PDF)</button>
                `;
            } else {
                attempts++;
                resultDiv.innerHTML = '<p style="color:red; font-weight:bold;">Record not found! Attempts: ' + attempts + '/3</p>';
            }
        }, 1500);
    }
    </script>
</body>
</html>
