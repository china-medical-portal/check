<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Medical Portal | 中国医疗</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f0f0; margin: 0; }
        .header { background: #cc0000; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .menu-btn { font-size: 25px; cursor: pointer; }
        .menu-content { display: none; background: white; border-bottom: 3px solid #cc0000; padding: 10px; }
        .menu-content a { display: block; padding: 12px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; font-weight: bold; }
        
        .container { padding: 20px; max-width: 450px; margin: auto; background: white; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #cc0000; color: white; font-weight: bold; cursor: pointer; }
        
        /* পূর্ণাঙ্গ রিপোর্ট লেআউট */
        .report-box { margin-top: 25px; border: 2px solid #333; padding: 15px; background: white; position: relative; }
        .stamp { position: absolute; top: 120px; right: 20px; border: 3px solid #000080; color: #000080; padding: 10px; font-weight: bold; transform: rotate(-15deg); opacity: 0.5; z-index: 10; pointer-events: none; }
        .table-area { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .table-area th, .table-area td { border: 1px solid #333; padding: 8px; text-align: left; }
        .footer-text { font-size: 11px; color: #333; text-align: center; margin-top: 20px; line-height: 1.6; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png" width="35" style="background:white; border-radius:50%">
        中国医疗检查中心
    </div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu-content">
    <a href="index.html">首页 (Home)</a>
    <a href="about.html">医院简介 (About)</a>
    <a href="rules.html">医疗法规 (Rules)</a>
    <a href="contact.html">联系我们 (Contact)</a>
</div>

<div class="container">
    <input type="text" id="passport" placeholder="Passport No (护照号码)">
    <input type="text" id="mobile" placeholder="Mobile No (手机号码)">
    <button onclick="checkReport()">立即查询 (Verify)</button>
    
    <div id="loader" style="display:none; text-align:center; color:#cc0000; margin:15px;">Processing... 正在核实...</div>
    <div id="result"></div>
</div>

<script>
function toggleMenu() {
    let m = document.getElementById("menu");
    m.style.display = (m.style.display === "block") ? "none" : "block";
}

function checkReport() {
    let loader = document.getElementById("loader");
    let res = document.getElementById("result");
    loader.style.display = "block";
    res.innerHTML = "";
    
    setTimeout(() => {
        loader.style.display = "none";
        let p = document.getElementById("passport").value;
        let m = document.getElementById("mobile").value;
        
        // উভয় ইউজারের তথ্য এখানে চেক হচ্ছে
        let isUser1 = (p === "A11758023" && m === "01407873051");
        let isUser2 = (p === "A22231008" && m === "01794492265");
        
        if(isUser1 || isUser2) {
            let imgLink = isUser1 ? "https://i.imgur.com/nQeMY9y.jpeg" : "https://i.imgur.com/ibqu4TL.jpeg";
            res.innerHTML = `
                <div class="report-box">
                    <div class="stamp">VERIFIED</div>
                    <img src="${imgLink}" style="width:100%; border:1px solid #ccc;">
                    <table class="table-area">
                        <tr><th>项目 (Test)</th><th>结果 (Result)</th></tr>
                        <tr><td>心电图 (ECG)</td><td>Normal / 正常</td></tr>
                        <tr><td>梅毒 (Syphilis)</td><td>Negative / 阴性</td></tr>
                        <tr><td>艾滋病 (HIV)</td><td>Negative / 阴性</td></tr>
                        <tr><td>胸片 (Chest X-ray)</td><td>Clear / 清晰</td></tr>
                    </table>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=Verified-${p}" alt="QR">
                        <div style="font-size:11px; text-align:right;">
                            <b>Ref ID: CN-${Math.floor(Math.random()*99999)}</b><br>
                            Auth: <i>Dr. Zhang Wei</i>
                        </div>
                    </div>
                </div>
                <div class="footer-text">
                    © 2026 中国医疗委员会 (National Health Commission)<br>
                    此报告由系统自动生成，具有法律效力。
                </div>
            `;
        } else {
            res.innerHTML = '<p style="color:red; text-align:center; font-weight:bold;">未找到记录 (No Record Found)</p>';
        }
    }, 2000);
}
</script>
</body>
</html>
