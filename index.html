<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Medical Portal | 医疗检查系统</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #eef2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 340px; text-align: center; border: 1px solid #d1d9e6; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { color: #003366; margin: 0; font-size: 24px; letter-spacing: -0.5px; }
        h4 { color: #555; margin: 5px 0 25px; font-weight: 400; font-size: 16px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e1e1; border-radius: 10px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #003366; outline: none; }
        button { width: 100%; padding: 15px; background: #003366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00509e; transform: translateY(-2px); }
        #result { margin-top: 25px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png" class="logo" alt="logo">
        <h2>Medical Portal</h2>
        <h4>医疗检查报告系统</h4>
        <input type="text" id="passport" placeholder="Passport Number">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <button onclick="showReport()">Submit / 提交</button>
        <div id="result"></div>
    </div>

    <script>
    function showReport() {
        let p = document.getElementById("passport").value;
        let m = document.getElementById("mobile").value;
        let resultDiv = document.getElementById("result");
        
        let users = [
            { pass: "A11758023", mob: "01407873051", img: "https://i.imgur.com/nQeMY9y.jpeg" },
            { pass: "A22231008", mob: "01794492265", img: "https://i.imgur.com/ibqu4TL.jpeg" }
        ];

        let found = users.find(u => u.pass === p && u.mob === m);

        if(found) {
            resultDiv.innerHTML = '<p style="color:green; font-weight:bold;">Status: Passed / 合格</p>' +
            '<img src="' + found.img + '" style="width:100%; border:3px solid #003366; border-radius:12px; margin-top:10px;">';
        } else {
            resultDiv.innerHTML = '<p style="color:red; font-weight:bold;">Record not found / 未找到记录</p>';
        }
    }
    </script>
</body>
</html>
