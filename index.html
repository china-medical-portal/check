<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Official Medical Portal | 医疗验证系统</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: white; padding: 20px; width: 100%; max-width: 450px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-top: 10px solid #cc0000; box-sizing: border-box; }
        h2 { color: #cc0000; text-align: center; margin: 0 0 5px 0; font-size: 20px; }
        .sub-title { text-align: center; color: #555; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #cc0000; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: #cc0000; }
        
        /* রিপোর্টের স্টাইল - ছবির সাথে টেবিল ও সিল */
        .report-box { margin-top: 20px; border: 1px solid #999; padding: 10px; position: relative; background: #fff; }
        .stamp { position: absolute; top: 15px; right: 15px; border: 3px solid #000080; color: #000080; padding: 5px; font-weight: bold; transform: rotate(-15deg); opacity: 0.6; pointer-events: none; }
        .qr-section { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .table-area { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .table-area th, .table-area td { border: 1px solid #999; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Medical Report</h2>
    <div class="sub-title">中国医疗检查验证系统</div>
    <input type="text" id="passport" placeholder="Passport Number">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <button onclick="checkReport()">Verify / 验证</button>
    
    <div id="loader">Processing... 正在核实...</div>
    <div id="result"></div>
</div>

<script>
function checkReport() {
    let loader = document.getElementById("loader");
    let res = document.getElementById("result");
    loader.style.display = "block";
    res.innerHTML = "";

    setTimeout(() => {
        loader.style.display = "none";
        let p = document.getElementById("passport").value;
        let m = document.getElementById("mobile").value;
        
        if(p === "A11758023" && m === "01407873051") {
            res.innerHTML = `
                <div class="report-box">
                    <div class="stamp">VERIFIED<br>OFFICIAL</div>
                    <img src="https://i.imgur.com/nQeMY9y.jpeg" style="width:100%;">
                    <table class="table-area">
                        <tr><th>Test / 项目</th><th>Result / 结果</th></tr>
                        <tr><td>ECG / 心电图</td><td>Normal / 正常</td></tr>
                        <tr><td>Syphilis / 梅毒</td><td>Negative / 阴性</td></tr>
                        <tr><td>HIV / 艾滋病</td><td>Negative / 阴性</td></tr>
                        <tr><td>Chest X-ray / 胸片</td><td>Clear / 清晰</td></tr>
                    </table>
                    <div class="qr-section">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=Verified" alt="QR">
                        <div style="font-size:11px; text-align:right;">
                            ID: CN-882910<br>
                            Auth: <i>Dr. Zhang Wei</i>
                        </div>
                    </div>
                </div>
            `;
        } else {
            res.innerHTML = '<p style="color:red; text-align:center; margin-top:15px;">Record not found / 未找到记录</p>';
        }
    }, 2000);
}
</script>
</body>
</html>
